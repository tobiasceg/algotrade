# Scheduler for the trading bot (Step 1).
#
# GitHub Actions cron fires 1-2+ hours LATE in practice (it's a congested
# queue, not a clock), and it only understands UTC (no US daylight-saving
# awareness). The counter-strategy, in layers:
#
#   1. Crons AIM EARLY: main.py sleeps until the intended work time
#      (entry 10:00 ET, exit 14:15 ET), so GitHub's queue lag eats into
#      the sleep instead of delaying the actual work.
#   2. Odd minutes (:07/:37) dodge the top-of-hour congestion spike.
#   3. Each run gets multiple firings (DST twin + late backup); the first
#      to complete journals the run, the rest skip via the dedupe.
#   4. The guard's wide window is the last resort if every firing is late.

name: trading-bot

on:
  schedule:
    - cron: "7 12 * * 1-5"   # entry — 8:07 ET in summer; sleeps to 10:00
    - cron: "7 13 * * 1-5"   # entry — DST twin, doubles as first backup
    - cron: "37 15 * * 1-5"  # entry — late backup, lands mid-window
    - cron: "7 16 * * 1-5"   # exit  — 12:07 ET in summer; sleeps to 14:15
    - cron: "7 17 * * 1-5"   # exit  — DST twin / backup
    - cron: "7 19 * * 1-5"   # exit  — late backup, still before the close
  # Manual trigger for testing from the GitHub UI (Actions tab -> Run workflow)
  workflow_dispatch:
    inputs:
      mode:
        description: "Which run to execute"
        required: true
        type: choice
        options: [entry, exit]
      force:
        description: "Bypass the trading-day/time-window guard"
        required: false
        type: boolean
        default: false

# Needed so the workflow can commit the decision journal back to the repo.
permissions:
  contents: write

# Serialize scheduled runs: firings queue behind each other, so by the time
# a backup firing starts, the primary has committed its journal record and
# the dedupe in main.py skips the backup cleanly. Manual runs get their own
# group so they never queue behind a scheduled job that is mid-sleep.
concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_id) || 'trading-bot' }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Generous: an early firing can spend up to ~3.5h asleep waiting for
    # its target time. Idle runner time is free on a public repo.
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Map whichever cron fired to a mode. github.event.schedule contains
      # the exact cron string that triggered this run; for manual runs we use
      # the dropdown input instead.
      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "force=${{ inputs.force && '--force' || '' }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "7 12 * * 1-5"|"7 13 * * 1-5"|"37 15 * * 1-5") echo "mode=entry" >> "$GITHUB_OUTPUT" ;;
              *)                                             echo "mode=exit"  >> "$GITHUB_OUTPUT" ;;
            esac
            echo "force=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bot
        id: bot
        run: python main.py --mode ${{ steps.mode.outputs.mode }} ${{ steps.mode.outputs.force }}
        env:
          # Add these under repo Settings -> Secrets and variables -> Actions
          # as the later steps get built. Missing secrets are just empty here.
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # The journal is the experiment's memory — commit it back so it survives
      # the ephemeral runner. Daily commits also keep GitHub's 60-day
      # inactivity rule from disabling the schedule.
      - name: Persist journal
        if: always()
        run: |
          git config user.name "trading-bot"
          git config user.email "actions@users.noreply.github.com"
          git add journal.jsonl
          if ! git diff --cached --quiet; then
            git commit -m "journal: ${{ steps.mode.outputs.mode }} run $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main
            git push
          fi

      # Snapshots are too bulky for the repo; keep 90 days as artifacts.
      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ github.run_id }}
          path: snapshots/
          if-no-files-found: ignore
          retention-days: 90
