# Scheduler for the trading bot (Step 1).
#
# GitHub Actions cron only understands UTC and never adjusts for US daylight
# saving time, so each run gets TWO cron lines — one for EDT (summer) and one
# for EST (winter). On top of that, GitHub fires crons 1-2+ hours late in
# practice, so the targets are set early, the Python guard in main.py accepts
# a wide window, and a journal-based dedupe makes sure only the first firing
# inside the window actually does work.
#
#   Entry run : aims 10:00 ET (~30 min after the open), valid until 13:30 ET
#   Exit run  : aims 14:15 ET, valid until the close — must land while the
#               market is open, hence the early target to absorb delays

name: trading-bot

on:
  schedule:
    - cron: "0 14 * * 1-5"   # entry — 10:00 ET while EDT (UTC-4)
    - cron: "0 15 * * 1-5"   # entry — 10:00 ET while EST (UTC-5)
    - cron: "15 18 * * 1-5"  # exit  — 14:15 ET while EDT
    - cron: "15 19 * * 1-5"  # exit  — 14:15 ET while EST
  # Manual trigger for testing from the GitHub UI (Actions tab -> Run workflow)
  workflow_dispatch:
    inputs:
      mode:
        description: "Which run to execute"
        required: true
        type: choice
        options: [entry, exit]
      force:
        description: "Bypass the trading-day/time-window guard"
        required: false
        type: boolean
        default: false

# Needed so the workflow can commit the decision journal back to the repo.
permissions:
  contents: write

# Serialize runs: if two delayed cron firings arrive close together, the
# second queues until the first finishes — by which time the first has
# committed its journal record, so the second checks out that commit and
# the dedupe in main.py skips it cleanly.
concurrency:
  group: trading-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Map whichever cron fired to a mode. github.event.schedule contains
      # the exact cron string that triggered this run; for manual runs we use
      # the dropdown input instead.
      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "force=${{ inputs.force && '--force' || '' }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "0 14 * * 1-5"|"0 15 * * 1-5") echo "mode=entry" >> "$GITHUB_OUTPUT" ;;
              *)                             echo "mode=exit"  >> "$GITHUB_OUTPUT" ;;
            esac
            echo "force=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bot
        id: bot
        run: python main.py --mode ${{ steps.mode.outputs.mode }} ${{ steps.mode.outputs.force }}
        env:
          # Add these under repo Settings -> Secrets and variables -> Actions
          # as the later steps get built. Missing secrets are just empty here.
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # The journal is the experiment's memory — commit it back so it survives
      # the ephemeral runner. Daily commits also keep GitHub's 60-day
      # inactivity rule from disabling the schedule.
      - name: Persist journal
        if: always()
        run: |
          git config user.name "trading-bot"
          git config user.email "actions@users.noreply.github.com"
          git add journal.jsonl
          if ! git diff --cached --quiet; then
            git commit -m "journal: ${{ steps.mode.outputs.mode }} run $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main
            git push
          fi

      # Snapshots are too bulky for the repo; keep 90 days as artifacts.
      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ github.run_id }}
          path: snapshots/
          if-no-files-found: ignore
          retention-days: 90
